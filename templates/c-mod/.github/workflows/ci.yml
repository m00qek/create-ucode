name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install ucode-lint
        run: npm install -g ucode-lint
      - name: Run linter
        run: ucode-lint

  test:
    name: Run Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run tests
        run: make test

  package:
    name: Build Package (${{ matrix.sdk }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk: ['25.12.4']
    steps:
      - uses: actions/checkout@v6
      - name: Export project variables
        run: grep '^PKG_NAME:=' openwrt/{{PKG_NAME}}/Makefile | sed 's/:=/=/' >> $GITHUB_ENV
      - name: Build package
        run: make package SDK_VERSION=${{ matrix.sdk }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.sdk }}
          path: build/${{ matrix.sdk }}/*/packages/**/${{ env.PKG_NAME }}*

  release:
    name: Create Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all package artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Create release
        run: |
          PRERELEASE=""
          echo "${{ github.ref_name }}" | grep -qE '\-(alpha|beta|rc)' && PRERELEASE="--prerelease"
          gh release create ${{ github.ref_name }} \
            --verify-tag \
            --generate-notes \
            --title "${{ github.ref_name }}" \
            $PRERELEASE \
            $(find artifacts -type f)
        env:
          GH_TOKEN: ${{ github.token }}
