name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test

  push-sample-app:
    name: Push pure-ucode scaffold
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - name: Scaffold
        run: |
          node index.js /tmp/ucode-sample-app \
            --template pure-ucode \
            --maintainer "António Mora <oliveira.fh42@gmail.com>"
      - name: Patch CI branch trigger
        run: |
          sed -i 's/branches: \[main, master\]/branches: [pure-ucode]/' \
            /tmp/ucode-sample-app/.github/workflows/ci.yml
      - name: Push orphan branch
        id: push
        run: |
          PUSH_TIME=$(date -u -d '-30 seconds' +%Y-%m-%dT%H:%M:%SZ)
          cd /tmp/ucode-sample-app
          git init
          git config user.email "oliveira.fh42@gmail.com"
          git config user.name "António Mora"
          git checkout --orphan pure-ucode
          git add -A
          git commit -m "chore: update from create-ucode@${GITHUB_SHA::8}"
          git remote add origin https://x-access-token:${{ secrets.SAMPLE_APP_TOKEN }}@github.com/m00qek/ucode-sample-app.git
          git push --force origin pure-ucode
          echo "push_time=$PUSH_TIME" >> $GITHUB_OUTPUT
      - name: Wait for orphan branch CI
        env:
          GH_TOKEN: ${{ secrets.SAMPLE_APP_TOKEN }}
          GITHUB_TOKEN: ""
        run: |
          for i in $(seq 1 24); do
            sleep 5
            RUN_ID=$(gh run list \
              --repo m00qek/ucode-sample-app \
              --branch pure-ucode \
              --limit 1 \
              --json databaseId,createdAt \
              --jq ".[0] | select(.createdAt >= \"${{ steps.push.outputs.push_time }}\") | .databaseId // empty")
            [ -n "$RUN_ID" ] && break
          done
          [ -z "$RUN_ID" ] && echo "Timed out waiting for CI run on pure-ucode branch" && exit 1
          gh run watch "$RUN_ID" --repo m00qek/ucode-sample-app --exit-status

  push-sample-app-c-mod:
    name: Push c-mod scaffold
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - name: Scaffold
        run: |
          node index.js /tmp/ucode-sample-app \
            --template c-mod \
            --maintainer "António Mora <oliveira.fh42@gmail.com>"
      - name: Patch CI branch trigger
        run: |
          sed -i 's/branches: \[main, master\]/branches: [c-module]/' \
            /tmp/ucode-sample-app/.github/workflows/ci.yml
      - name: Push orphan branch
        id: push
        run: |
          PUSH_TIME=$(date -u -d '-30 seconds' +%Y-%m-%dT%H:%M:%SZ)
          cd /tmp/ucode-sample-app
          git init
          git config user.email "oliveira.fh42@gmail.com"
          git config user.name "António Mora"
          git checkout --orphan c-module
          git add -A
          git commit -m "chore: update from create-ucode@${GITHUB_SHA::8}"
          git remote add origin https://x-access-token:${{ secrets.SAMPLE_APP_TOKEN }}@github.com/m00qek/ucode-sample-app.git
          git push --force origin c-module
          echo "push_time=$PUSH_TIME" >> $GITHUB_OUTPUT
      - name: Wait for orphan branch CI
        env:
          GH_TOKEN: ${{ secrets.SAMPLE_APP_TOKEN }}
          GITHUB_TOKEN: ""
        run: |
          for i in $(seq 1 24); do
            sleep 5
            RUN_ID=$(gh run list \
              --repo m00qek/ucode-sample-app \
              --branch c-module \
              --limit 1 \
              --json databaseId,createdAt \
              --jq ".[0] | select(.createdAt >= \"${{ steps.push.outputs.push_time }}\") | .databaseId // empty")
            [ -n "$RUN_ID" ] && break
          done
          [ -z "$RUN_ID" ] && echo "Timed out waiting for CI run on c-module branch" && exit 1
          gh run watch "$RUN_ID" --repo m00qek/ucode-sample-app --exit-status

  publish:
    name: Publish to npm
    needs: [test, push-sample-app, push-sample-app-c-mod]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm publish --provenance
